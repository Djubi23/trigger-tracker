<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a0d0f;color:#e2f0eb;font-family:system-ui,sans-serif;padding:24px}

.logs-title{font-size:13px;color:#8aad9b;margin-bottom:12px;font-weight:500}

.auth-sub{font-size:13px;color:#6b8f7e;text-align:center;margin-bottom:8px}

.field-input:focus{border-color:#10b981}
.btn-primary{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;width:100%;transition:opacity 0.15s}
.btn-primary:hover{opacity:0.9}
.error-msg{font-size:13px;color:#f87171;text-align:center}
.no-access{text-align:center;color:#f87171;font-size:14px;margin-top:12px}
.empty{text-align:center;color:#3a5a4a;font-size:14px;padding:32px}
.filter-bar{display:flex;gap:8px;max-width:1100px;margin:0 auto 16px;flex-wrap:wrap}
.filter-chip{background:#111d18;border:1px solid #1e3329;border-radius:20px;padding:6px 14px;font-size:12px;color:#6b8f7e;cursor:pointer;transition:all 0.2s}
.filter-chip:hover{border-color:#10b981;color:#10b981}
.filter-chip.active{background:#0d2e22;border-color:#10b981;color:#10b981}
.client-select{background:#111d18;border:1px solid #1e3329;border-radius:10px;padding:8px 14px;color:#e2f0eb;font-size:13px;outline:none;cursor:pointer}
</style>

  const{data:{user}}=await sb.auth.getUser();
  currentUser=user;
  if(!user){renderAuth();return;}
  if(user.email!==COACH_EMAIL){renderNoAccess();return;}
  await loadLogs();
  renderDashboard();
}

async function loadLogs(){
  const{data,error}=await sb.from('trigger_logs').select('*').order('created_at',{ascending:false});
  if(!error)logs=data||[];
  filteredLogs=[...logs];
}

  document.getElementById('root').innerHTML=`

  document.getElementById('root').innerHTML=`

      <div class="auth-title">Prístup zamietnutý</div>

      <button class="btn-primary" style="margin-top:12px" onclick="doLogout()">Odhlásiť sa</button>

async function doLogin(){
  const email=document.getElementById('aemail').value.trim();
  const pass=document.getElementById('apass').value;
  const err=document.getElementById('aerr');
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent=error.message;return;}
  if(data.user.email!==COACH_EMAIL){err.textContent='Prístup zamietnutý.';await sb.auth.signOut();return;}
  currentUser=data.user;
  await loadLogs();
  renderDashboard();
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;
  renderAuth();
}

  if(v<=3)return'#10b981';
  if(v<=6)return'#f59e0b';
  return'#ef4444';
}
