<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0d1117;color:#e2f0eb;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
#app{width:100%;max-width:440px;background:#0d1117;border-radius:16px;border:1px solid #1a2e28;overflow:hidden;position:relative}
.radar-bg{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(16,185,129,0.07) 0%,transparent 65%);pointer-events:none;z-index:0}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;position:relative;z-index:3}
.lang-toggle{background:#111d18;border:1px solid #1e3329;border-radius:20px;padding:4px;display:flex;gap:2px}
.lang-btn{background:transparent;border:none;color:#6b8f7e;font-size:12px;padding:4px 10px;border-radius:16px;cursor:pointer;transition:all 0.2s;font-weight:500}
.lang-btn.active{background:#10b981;color:#fff}
.logo-label{font-size:11px;letter-spacing:0.12em;color:#10b981;text-transform:uppercase;font-weight:500}
.progress-bar{height:2px;background:#1a2e28;position:relative;z-index:2}
.progress-fill{height:100%;background:linear-gradient(90deg,#10b981,#34d399);transition:width 0.4s ease}
.screen{min-height:520px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 24px 32px;z-index:1;position:relative}
.step-label{font-size:11px;letter-spacing:0.12em;color:#10b981;text-transform:uppercase;margin-bottom:8px;text-align:center}
.headline{font-size:22px;font-weight:500;text-align:center;color:#e2f0eb;line-height:1.35;margin-bottom:8px}
.subtext{font-size:14px;color:#6b8f7e;text-align:center;line-height:1.6;margin-bottom:24px;max-width:320px}
.btn-primary{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:12px;padding:14px 36px;font-size:15px;font-weight:500;cursor:pointer;width:100%;max-width:320px;transition:transform 0.15s,opacity 0.15s;margin-top:8px}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
.btn-secondary{background:transparent;color:#6b8f7e;border:1px solid #1e3329;border-radius:12px;padding:12px 36px;font-size:14px;cursor:pointer;width:100%;max-width:320px;margin-top:8px;transition:border-color 0.2s,color 0.2s}
.btn-secondary:hover{border-color:#10b981;color:#10b981}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:320px;margin-bottom:16px}
.card-opt{background:#111d18;border:1px solid #1e3329;border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;font-size:13px;color:#8aad9b;transition:all 0.2s;line-height:1.3}
.card-opt:hover{border-color:#10b981;color:#e2f0eb}
.card-opt.selected{background:#0d2e22;border-color:#10b981;color:#10b981}
.life-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:320px;margin-bottom:16px}
.life-card{background:#111d18;border:1px solid #1e3329;border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;font-size:12px;color:#8aad9b;transition:all 0.2s;line-height:1.3}
.life-card:hover{border-color:#10b981;color:#e2f0eb}
.life-card.selected{background:#0d2e22;border-color:#10b981;color:#10b981;font-weight:500}
.chips-wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:320px;margin-bottom:16px}
.chip{background:#111d18;border:1px solid #1e3329;border-radius:20px;padding:8px 16px;font-size:13px;color:#8aad9b;cursor:pointer;transition:all 0.2s}
.chip:hover{border-color:#10b981;color:#e2f0eb}
.chip.selected{background:#0d2e22;border-color:#10b981;color:#10b981}
.body-map-wrap{position:relative;width:160px;height:280px;margin:0 auto 16px}
.body-svg{width:100%;height:100%}
.body-part{cursor:pointer;transition:fill 0.2s;fill:#1e3329;stroke:#2e5045;stroke-width:1.5}
.body-part:hover{fill:#1e4035}
.body-part.selected{fill:#10b981;stroke:#34d399}
.slider-wrap{width:100%;max-width:320px;margin-bottom:8px}
.intensity-slider{width:100%;appearance:none;height:4px;background:#1e3329;border-radius:4px;outline:none;accent-color:#10b981}
.intensity-value{font-size:48px;font-weight:500;color:#10b981;text-align:center;margin-bottom:4px}
.intensity-desc{font-size:13px;color:#6b8f7e;text-align:center;margin-bottom:16px;min-height:20px}
.field-input{background:#111d18;border:1px solid #1e3329;border-radius:10px;padding:12px 16px;color:#e2f0eb;font-size:14px;width:100%;max-width:320px;margin-bottom:12px;outline:none;font-family:inherit}
.field-input:focus{border-color:#10b981}
textarea.field-input{resize:none;min-height:80px}
.or-divider{font-size:12px;color:#3a5a4a;text-align:center;margin:4px 0 12px;width:100%;max-width:320px}
.completion-icon{width:72px;height:72px;border-radius:50%;background:#0d2e22;border:2px solid #10b981;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px;color:#10b981}
.error-msg{font-size:13px;color:#f87171;margin-top:8px;text-align:center}
.auth-wrap{width:100%;max-width:320px;display:flex;flex-direction:column;align-items:center}
.auth-toggle{font-size:13px;color:#6b8f7e;margin-top:16px;cursor:pointer;text-align:center}
.auth-toggle span{color:#10b981;text-decoration:underline}
.hint{font-size:11px;color:#3a5a4a;text-align:center;margin-bottom:8px}
</style>
</head>

    lifeAreas:['Work','Relationships','Family','Parenting','Money','Health','Identity','Past','Spirituality','Appearance','Intellect','Vision'],

    regulation:['breathing','meditation','walk','training','music','conversation','journaling','pause','nothing yet'],

const BODY_PARTS=[
  {id:'head',cx:80,cy:28,rx:20,ry:22},
  {id:'throat',cx:80,cy:56,rx:9,ry:9},
  {id:'chest',cx:80,cy:92,rx:28,ry:26},
  {id:'stomach',cx:80,cy:132,rx:24,ry:20},
  {id:'pelvis',cx:80,cy:166,rx:26,ry:16},
  {id:'l_shoulder',cx:46,cy:76,rx:14,ry:13},
  {id:'r_shoulder',cx:114,cy:76,rx:14,ry:13},
  {id:'l_arm',cx:32,cy:118,rx:11,ry:26},
  {id:'r_arm',cx:128,cy:118,rx:11,ry:26},
  {id:'l_hand',cx:28,cy:156,rx:9,ry:12},
  {id:'r_hand',cx:132,cy:156,rx:9,ry:12},
  {id:'l_leg',cx:62,cy:214,rx:14,ry:30},
  {id:'r_leg',cx:98,cy:214,rx:14,ry:30},
  {id:'l_foot',cx:58,cy:258,rx:13,ry:9},
  {id:'r_foot',cx:102,cy:258,rx:13,ry:9}
];

let step=0,authMode='login',currentUser=null;
let data={triggerCards:[],triggerText:'',lifeAreas:[],bodyParts:[],sensations:[],intensity:5,date:new Date().toISOString().split('T')[0],time:'',regulation:[]};

function t(){return T[lang];}

function setLang(l){
  lang=l;
  document.getElementById('btn-sk').classList.toggle('active',l==='sk');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  render();
}

async function init(){const{data:{user}}=await sb.auth.getUser();currentUser=user;render();}

function setProgress(s){document.getElementById('progress').style.width=(s===0?0:Math.round(s/9*100))+'%';}

function render(){
  const sc=document.getElementById('screen');
  sc.style.opacity='0';sc.style.transform='translateX(16px)';
  setTimeout(()=>{
    sc.innerHTML=currentUser?getStep():getAuth();
    sc.style.transition='opacity 0.22s ease,transform 0.22s ease';
    sc.style.opacity='1';sc.style.transform='translateX(0)';
  },160);
}

function getAuth(){
  setProgress(0);
  const isLogin=authMode==='login';
  return`<div class="step-label">${t().appName}</div>
  <div class="headline">${isLogin?t().signIn:t().signUp}</div>
  <div class="subtext">${isLogin?t().signInSub:t().signUpSub}</div>
  <div class="auth-wrap">
    ${!isLogin?`<input class="field-input" id="aname" type="text" placeholder="${t().name}" />`:''}
    <input class="field-input" id="aemail" type="email" placeholder="${t().email}" />
    <input class="field-input" id="apass" type="password" placeholder="${t().password}" />
    <button class="btn-primary" onclick="doAuth()">${isLogin?t().loginBtn:t().signupBtn}</button>
    <div id="aerr" class="error-msg"></div>
    <div class="auth-toggle" onclick="toggleAuth()">${isLogin?t().noAccount:t().hasAccount}</div>
  </div>`;}

function getStep(){
  setProgress(step);
  const l=t();
  if(step===0)return`
    <div class="step-label">${l.welcomeLabel}</div>
    <div class="headline" style="font-size:24px;margin-bottom:12px;">${l.welcomeHead}</div>
    <div class="subtext">${l.welcomeSub}</div>
    <button class="btn-primary" onclick="next()">${l.startBtn}</button>`;

  if(step===1)return`
    <div class="step-label">${l.step1label}</div>
    <div class="headline">${l.step1head}</div>
    <div class="subtext">${l.step1sub}</div>
    <div class="cards-grid">${l.triggers.map((tr,i)=>`<div class="card-opt${data.triggerCards.includes(i)?' selected':''}" onclick="toggleTrigger(${i})">${tr}</div>`).join('')}</div>
    <div class="or-divider">${l.orDivider}</div>
    <textarea class="field-input" id="ttext" placeholder="${l.step1placeholder}">${data.triggerText}</textarea>
    <button class="btn-primary" onclick="saveTrigger()">${l.continueBtn}</button>`;

  if(step===2)return`
    <div class="step-label">${l.step2label}</div>
    <div class="headline">${l.step2head}</div>
    <div class="subtext">${l.step2sub}</div>
    <div class="life-grid">${l.lifeAreas.map((a,i)=>`<div class="life-card${data.lifeAreas.includes(i)?' selected':''}" onclick="toggleLife(${i})">${a}</div>`).join('')}</div>
    <button class="btn-primary" onclick="next()">${l.continueBtn}</button>`;

  if(step===3)return`
    <div class="step-label">${l.step3label}</div>
    <div class="headline">${l.step3head}</div>
    <div class="subtext">${l.step3sub}</div>
    <div class="body-map-wrap"><svg class="body-svg" viewBox="0 0 160 275" xmlns="http://www.w3.org/2000/svg">${BODY_PARTS.map(p=>`<ellipse class="body-part${data.bodyParts.includes(p.id)?' selected':''}" id="bp-${p.id}" cx="${p.cx}" cy="${p.cy}" rx="${p.rx}" ry="${p.ry}" onclick="toggleBody('${p.id}')" />`).join('')}</svg></div>
    <button class="btn-primary" onclick="next()">${l.continueBtn}</button>`;

  if(step===4)return`
    <div class="step-label">${l.step4label}</div>
    <div class="headline">${l.step4head}</div>
    <div class="subtext">${l.step4sub}</div>
    <div class="chips-wrap">${l.sensations.map((s,i)=>`<div class="chip${data.sensations.includes(i)?' selected':''}" onclick="toggleIdx('sensations',${i})">${s}</div>`).join('')}</div>
    <button class="btn-primary" onclick="next()">${l.continueBtn}</button>`;

  if(step===5)return`
    <div class="step-label">${l.step5label}</div>
    <div class="headline">${l.step5head}</div>
    <div class="intensity-value" id="ival">${data.intensity}</div>
    <div class="intensity-desc" id="idesc">${l.intLabels[data.intensity]||''}</div>
    <div class="slider-wrap">
      <input type="range" class="intensity-slider" id="islider" min="1" max="10" step="1" value="${data.intensity}" oninput="updInt(this.value)"/>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#3a5a4a;margin-top:4px;"><span>1</span><span>10</span></div>
    </div>
    <button class="btn-primary" onclick="next()" style="margin-top:20px;">${l.continueBtn}</button>`;

  if(step===6)return`
    <div class="step-label">${l.step6label}</div>
    <div class="headline">${l.step6head}</div>
    <input type="date" class="field-input" value="${data.date}" onchange="data.date=this.value"/>
    <input type="time" class="field-input" value="${data.time}" onchange="data.time=this.value"/>
    <button class="btn-primary" onclick="next()">${l.continueBtn}</button>`;

  if(step===7)return`
    <div class="step-label">${l.step7label}</div>
    <div class="headline">${l.step7head}</div>
    <div class="subtext">${l.step7sub}</div>
    <div class="chips-wrap">${l.regulation.map((r,i)=>`<div class="chip${data.regulation.includes(i)?' selected':''}" onclick="toggleIdx('regulation',${i})">${r}</div>`).join('')}</div>
    <button class="btn-primary" onclick="saveLog()">${l.continueBtn}</button>`;

  if(step===8)return`
    <div class="completion-icon">✓</div>
    <div class="headline">${l.step8head}</div>
    <div class="subtext">${l.step8sub}</div>
    <button class="btn-primary" onclick="resetFlow()">${l.logAnother}</button>
    <button class="btn-secondary" onclick="showDashboard()">${l.viewRadar}</button>`;
  return'';
}

function toggleAuth(){authMode=authMode==='login'?'signup':'login';render();}

async function doAuth(){
  const email=document.getElementById('aemail')?.value?.trim();
  const pass=document.getElementById('apass')?.value;
  const err=document.getElementById('aerr');
  if(!email||!pass){err.textContent=lang==='sk'?'Vyplň všetky polia.':'Please fill in all fields.';return;}
  let res;
  if(authMode==='signup'){
    const name=document.getElementById('aname')?.value?.trim()||'';
    res=await sb.auth.signUp({email,password:pass,options:{data:{name}}});
  }else{
    res=await sb.auth.signInWithPassword({email,password:pass});
  }
  if(res.error){err.textContent=res.error.message;return;}
  currentUser=res.data.user;render();
}

function toggleTrigger(i){
  if(data.triggerCards.includes(i))data.triggerCards=data.triggerCards.filter(x=>x!==i);
  else data.triggerCards.push(i);
  document.querySelectorAll('.card-opt').forEach((el,idx)=>el.classList.toggle('selected',data.triggerCards.includes(idx)));
}
function saveTrigger(){data.triggerText=document.getElementById('ttext')?.value||'';next();}

function toggleLife(i){
  if(data.lifeAreas.includes(i))data.lifeAreas=data.lifeAreas.filter(x=>x!==i);
  else data.lifeAreas.push(i);
  document.querySelectorAll('.life-card').forEach((el,idx)=>el.classList.toggle('selected',data.lifeAreas.includes(idx)));
}

function toggleBody(id){
  if(data.bodyParts.includes(id))data.bodyParts=data.bodyParts.filter(x=>x!==id);
  else data.bodyParts.push(id);
  const el=document.getElementById('bp-'+id);
  if(el)el.classList.toggle('selected',data.bodyParts.includes(id));
}

function toggleIdx(key,i){
  if(data[key].includes(i))data[key]=data[key].filter(x=>x!==i);
  else data[key].push(i);
  document.querySelectorAll('.chip').forEach((el,idx)=>el.classList.toggle('selected',data[key].includes(idx)));
}

function updInt(v){
  data.intensity=parseInt(v);
  const iv=document.getElementById('ival');
  const id=document.getElementById('idesc');
  if(iv)iv.textContent=data.intensity;
  if(id)id.textContent=t().intLabels[data.intensity]||'';
}

function next(){step=Math.min(step+1,8);render();}

async function saveLog(){
  if(!currentUser)return;
  const btn=document.querySelector('.btn-primary');
  if(btn){btn.textContent=t().saving;btn.disabled=true;}
  const l=t();
  const{error}=await sb.from('trigger_logs').insert({
    user_id:currentUser.id,
    trigger_text:data.triggerText,
    trigger_card:data.triggerCards.map(i=>l.triggers[i]).join(', '),
    life_area:data.lifeAreas.map(i=>l.lifeAreas[i]).join(', '),
    body_parts:data.bodyParts.join(','),
    sensations:data.sensations.map(i=>l.sensations[i]).join(', '),
    intensity:data.intensity,
    event_date:data.date,
    event_time:data.time||null,
    regulation:data.regulation.map(i=>l.regulation[i]).join(', ')
  });
  if(error){
    if(btn){btn.textContent=t().continueBtn;btn.disabled=false;}
    const e=document.createElement('div');e.className='error-msg';e.textContent='Error: '+error.message;
    btn?.parentNode?.appendChild(e);return;
  }
  next();
}

function resetFlow(){
  step=0;
  data={triggerCards:[],triggerText:'',lifeAreas:[],bodyParts:[],sensations:[],intensity:5,date:new Date().toISOString().split('T')[0],time:'',regulation:[]};
  render();
}
function showDashboard(){alert(t().dashSoon);}

init();
</script>
</body>
</html>
